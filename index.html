<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="style.css">
     <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
     <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oxygen:wght@300;400;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <title>IsiXhosa AI poem generation</title>
</head>

<body>
    <div class="container">
    <header>
        <h1> 
            AI poem generation
        </h1>
    </header>
    <main>
        
        <form id="form">
            <input type="text" placeholder="enter a word to generate a poem in isiXhosa" autofocus autocomplete="off" class="text-builder" id="poem-generator"/>
            <input type="submit" class="submit-form"/>
        </form>
        <br />
        <br/>
        <div class="poem" id="poem">   
        </div>
        <br />
    </main>
    <footer>
        Coded by <a href="https://github.com/QhamaniMagasana">Qhamani Magasana</a> open sourced on <a href="https://github.com/QhamaniMagasana?tab=repositories">Github</a> hosted on <a href="https://app.netlify.com/teams/qhamanimagasana/projects">Netlify.</a>
    </footer>
    </div>
    <script src="index.js"></script>
</body>
</html>
